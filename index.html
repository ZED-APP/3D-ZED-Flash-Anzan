/* ================= SPAWN ================= */
function spawnNumber(value, z){
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle="black";
  ctx.fillRect(0,0,256,256);

  ctx.font="bold 60px Arial";
  ctx.fillStyle="white";
  ctx.textAlign="center";
  ctx.fillText(value,128,140);

  const tex = new THREE.CanvasTexture(canvas);

/* SHOW NUMBER */
function showNumber(n){
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(2,2),
    new THREE.MeshBasicMaterial({map:tex, transparent:true})
    new THREE.SphereGeometry(0.2),
    new THREE.MeshStandardMaterial({color:0x00ff99})
  );

  mesh.position.set((Math.random()-0.5)*6,2,z);
  scene.add(mesh);
  mesh.position.set(
    (Math.random()-0.5)*3,
    2,
    (Math.random()-0.5)*3
  );

  numbers.push(mesh);
  scene.add(mesh);
  setTimeout(()=>scene.remove(mesh),600);
}

/* ================= START ================= */
function startGame(){
/* START */
document.getElementById("startBtn").onclick = () => {
  if(running) return;
  running = true;
  index = 0;
  score = 0;

  numbers.forEach(n => scene.remove(n));
  numbers = [];
  sequence = [];
  total = 0;

  document.getElementById("answerBox").style.display = "none";
  document.getElementById("result").innerText = "";
  document.getElementById("ui").style.display = "none";

  generateSequence();
  const mode = document.getElementById("mode").value;
  const max = parseInt(document.getElementById("digits").value);
  const speed = parseInt(document.getElementById("speed").value);
  const lines = parseInt(document.getElementById("lines").value);

  for(let i=0;i<sequence.length;i++){
    spawnNumber(sequence[i], -i*6 - 10);
  }
  let i = 0;

  speed = parseFloat(document.getElementById("speed").value) * 0.05;
}
  const interval = setInterval(()=>{
    let num = gen(max, mode);

/* ================= ANSWER ================= */
    sequence.push(num);
    total += num;

    showNumber(num);

    i++;
    if(i >= lines){
      clearInterval(interval);

      setTimeout(()=>{
        document.getElementById("answerBox").style.display = "block";
      }, speed);
    }
  }, speed);
};

  let ans = parseInt(document.getElementById("answer").value);
  let result = document.getElementById("result");
  let val = parseInt(document.getElementById("answer").value);
  let res = document.getElementById("result");

  if(ans === totalSum){
    result.innerText = "✅ Correct!";
  if(val === total){
    res.innerHTML = "✅ Correct!";
  } else {
    result.innerText = "❌ Wrong! Answer: " + totalSum;
    res.innerHTML = "❌ Wrong! Answer: " + total;

  },2000);
}

/* ================= LOOP ================= */
/* LOOP */
function animate(){
  requestAnimationFrame(animate);

  if(running){
    camera.position.z -= speed;

    let passedAll = true;

    numbers.forEach(n=>{
      n.position.z += speed;

      if(n.position.z < camera.position.z + 10){
        passedAll = false;
      }
    });

    // END GAME
    if(passedAll && numbers.length > 0){
      running = false;
      document.getElementById("ui").style.display = "none";
      document.getElementById("answerBox").style.display = "block";
    }
    camera.position.z -= 0.05;
    player.position.x = Math.sin(Date.now()*0.001)*2;
  }

  renderer.render(scene,camera);
}
