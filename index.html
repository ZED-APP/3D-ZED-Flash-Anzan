<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZED Flash Anzan Jungle</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  overflow: hidden;
  font-family: "Segoe UI", Arial, sans-serif;
  background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
  color: white;
}

/* ===== GLASS PANEL ===== */
.panel {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
  border-radius: 12px;
}

/* ===== UI ===== */
#ui {
  position: absolute;
  top: 15px;
  left: 15px;
  width: min(90vw, 300px);
  padding: 15px;
  z-index: 10;
}

#ui h2 {
  margin: 0 0 10px;
  text-align: center;
  font-size: clamp(16px, 2vw, 20px);
}

#ui label {
  display: block;
  margin-top: 8px;
  font-size: 12px;
  opacity: 0.8;
}

#ui input,
#ui select {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  border-radius: 6px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 14px;
}

#startBtn {
  margin-top: 12px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #00ffcc, #00c3ff);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* ===== HUD ===== */
#hud {
  position: absolute;
  bottom: 20px;
  left: 20px;
  padding: 10px 14px;
  font-size: clamp(14px, 2vw, 20px);
}

/* ===== ANSWER BOX ===== */
#answerBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(90vw, 320px);
  padding: 20px;
  text-align: center;
  display: none;
}

#answerBox input {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 16px;
}

#answerBox button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(45deg, #ffcc00, #ff8800);
}

/* ===== MOBILE LAYOUT ===== */
@media (max-width: 768px) {
  #ui {
    top: auto;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 95vw;
  }

  #hud {
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
  }
}
</style>
</head>

<body>

<div id="ui" class="panel">
  <h2>⚡ ZED ANZAN</h2>

  <label>Speed</label>
  <input id="speed" type="range" min="1" max="20" value="5">

  <label>Digit Range</label>
  <select id="digits">
    <option value="9">1 - 9</option>
    <option value="99">1 - 99</option>
    <option value="999">1 - 999</option>
    <option value="9999">1 - 9999</option>
    <option value="99999">1 - 99999</option>
  </select>

  <label>Mode</label>
  <select id="mode">
    <option value="both">+ and -</option>
    <option value="plus">Only +</option>
    <option value="minus">Only -</option>
  </select>

  <label>Lines</label>
  <input id="lines" type="number" value="5" min="1" max="50">

  <button id="startBtn">Start Game</button>
</div>

<div id="hud" class="panel">Score: 0</div>

<div id="answerBox" class="panel">
  <h3>Enter Answer</h3>
  <input id="answer" type="number">
  <button onclick="checkAnswer()">Submit</button>
  <p id="result"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let numbers = [];
let sequence = [];
let running = false;
let totalSum = 0;
let speed = 0.1;

init();
animate();

function init(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,2,5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,5);
  scene.add(light);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20,200),
    new THREE.MeshStandardMaterial({color:0x1f7a3a})
  );
  ground.rotation.x = -Math.PI/2;
  ground.position.z = -80;
  scene.add(ground);
}

function generateSequence(){
  sequence = [];
  totalSum = 0;

  const max = +digits.value;
  const mode = modeSelect.value;
  const lines = +linesInput.value;

  for(let i=0;i<lines;i++){
    let val = Math.floor(Math.random()*max)+1;
    if(mode === "minus") val *= -1;
    else if(mode === "both") val = Math.random()>0.5 ? val : -val;

    sequence.push(val);
    totalSum += val;
  }
}

function spawnNumber(value, z){
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle="black";
  ctx.fillRect(0,0,256,256);

  ctx.fillStyle="white";
  ctx.font="bold 60px Arial";
  ctx.textAlign="center";
  ctx.fillText(value,128,140);

  const tex = new THREE.CanvasTexture(canvas);

  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(2,2),
    new THREE.MeshBasicMaterial({map:tex, transparent:true})
  );

  mesh.position.set((Math.random()-0.5)*6,2,z);
  scene.add(mesh);
  numbers.push(mesh);
}

function startGame(){
  running = true;
  numbers.forEach(n => scene.remove(n));
  numbers = [];

  answerBox.style.display = "none";
  generateSequence();

  for(let i=0;i<sequence.length;i++){
    spawnNumber(sequence[i], -i*6 - 10);
  }

  speed = speedInput.value * 0.05;
}

function checkAnswer(){
  let ans = +answer.value;
  result.innerText = (ans === totalSum)
    ? "✅ Correct!"
    : "❌ Wrong! " + totalSum;

  setTimeout(()=>{
    answerBox.style.display = "none";
    ui.style.display = "block";
  },2000);
}

function animate(){
  requestAnimationFrame(animate);

  if(running){
    camera.position.z -= speed;

    let done = true;
    numbers.forEach(n=>{
      n.position.z += speed;
      if(n.position.z < camera.position.z + 10) done = false;
    });

    if(done && numbers.length){
      running = false;
      ui.style.display = "none";
      answerBox.style.display = "block";
    }
  }

  renderer.render(scene,camera);
}

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
