<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D ZED Flash Anzan - Elite Mind Training</title>
    <style>
        /* Base Reset & Core Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #03140a;
        }

        /* 3D WebGL Viewport Container */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI HUD Layer Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .interactive {
            pointer-events: auto;
        }

        /* HUD top bar styling */
        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .hud-card {
            background: rgba(4, 28, 13, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid #27ae60;
            border-radius: 14px;
            padding: 10px 22px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            letter-spacing: 1px;
        }
        .diamond-icon {
            color: #00f0ff;
            font-size: 1.4rem;
            filter: drop-shadow(0 0 6px #00f0ff);
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* Flash Anzan Matrix Screen Display */
        #display-screen {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 7.5rem;
            font-weight: 900;
            color: #fffb00;
            text-shadow: 0 0 15px rgba(255, 251, 0, 0.9), 
                         0 0 35px rgba(255, 102, 0, 0.7),
                         0 0 60px rgba(255, 0, 0, 0.4);
            transition: transform 0.08s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            font-family: 'Impact', 'Arial Black', sans-serif;
            letter-spacing: 2px;
        }

        /* Glassmorphic Tactical Input Panel */
        #input-panel {
            background: rgba(6, 20, 11, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 3px solid #ffd700;
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 440px;
            margin: 0 auto 20px auto;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: none;
            transform: scale(0.8) translateY(50px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #input-panel.active {
            display: block;
            transform: scale(1) translateY(0);
            opacity: 1;
        }
        #input-panel h3 {
            color: #ffffff;
            margin-bottom: 18px;
            font-size: 1.3rem;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }
        #answer-input {
            width: 100%;
            padding: 15px;
            font-size: 2.5rem;
            text-align: center;
            border: 2px solid #27ae60;
            border-radius: 14px;
            margin-bottom: 20px;
            background: #ffffff;
            color: #111111;
            font-weight: 900;
            outline: none;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
        }
        #answer-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1e7e43, 0 12px 24px rgba(46, 204, 113, 0.3);
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e7e43, 0 6px 12px rgba(46, 204, 113, 0.2);
        }

        /* Cinematic Game Modals (Start / Transitions) */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(10,35,18,0.98) 0%, rgba(3,15,7,0.99) 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 24px;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .modal h1 {
            font-size: 3.5rem;
            color: #ffd700;
            margin-bottom: 15px;
            font-family: 'Impact', sans-serif;
            letter-spacing: 3px;
            text-shadow: 0 6px 15px rgba(0,0,0,0.6), 0 0 20px rgba(255,215,0,0.2);
        }
        .modal p {
            font-size: 1.2rem;
            margin-bottom: 35px;
            max-width: 550px;
            color: #aaeebb;
            line-height: 1.6;
        }
        .hide { 
            opacity: 0;
            visibility: hidden;
            pointer-events: none !important;
        }

        /* Subtle Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Responsive UI Breakpoints */
        @media (max-width: 600px) {
            #display-screen { font-size: 5rem; top: 35%; }
            .modal h1 { font-size: 2.3rem; }
            .modal p { font-size: 1rem; }
            .hud-card { font-size: 0.95rem; padding: 8px 14px; }
            #input-panel { padding: 20px; width: 95%; }
            #answer-input { font-size: 2rem; padding: 10px; }
        }
    </style>
    <!-- Three.js CDN Engine Implementation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- WebGL Render Canvas Target -->
    <div id="canvas-container"></div>

    <!-- Active Heads-Up Display Overlay Layer -->
    <div id="ui-layer">
        <div class="top-bar">
            <div class="hud-card">STAGE: <span id="lbl-stage">1</span>/50</div>
            <div class="hud-card"><span class="diamond-icon">💎</span> <span id="lbl-diamonds">0</span></div>
        </div>

        <!-- Rapid Anzan Number Visual Target -->
        <div id="display-screen"></div>

        <!-- Tactical Response Entry Form -->
        <div id="input-panel" class="interactive">
            <h3>Calculate Total Sum</h3>
            <input type="number" id="answer-input" pattern="[0-9]*" inputmode="numeric" placeholder="?">
            <button class="btn" id="btn-submit">Submit Evaluation</button>
        </div>
    </div>

    <!-- Launcher/Boot Screen Menu Overlay -->
    <div id="modal-start" class="modal interactive">
        <h1>3D ZED FLASH ANZAN</h1>
        <p>Sprint swiftly through the dynamic, changing jungle. Keep extreme mental track of the high-speed flashing arithmetic sequences, and compute the absolute result at the end line.</p>
        <button class="btn" id="btn-start" style="max-width: 320px;">Deploy Mission</button>
    </div>

    <script>
        // --- GAME SYSTEM DATA CORE ---
        const gameState = {
            stage: 1,
            diamonds: 0,
            sequenceArray: [],
            computedTarget: 0,
            isDisplaying: false,
            velocityModifier: 1.0
        };

        // --- GRAPHICS GRAPH ENGINE PROPERTIES ---
        let scene, camera, renderer, characterNode, foliagePool = [];
        const container = document.getElementById('canvas-container');

        function bootstrapGraphics() {
            // Scene Initialization & Atmosphere
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x051d0e);
            scene.fog = new THREE.FogExp2(0x051d0e, 0.012);

            // Perspective Camera Setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // WebGL Renderer Configurations
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Natural Lighting Networks
            const hemisphereLight = new THREE.HemisphereLight(0x33ff66, 0x113311, 0.6);
            scene.add(hemisphereLight);

            const trackingSun = new THREE.DirectionalLight(0xfffdd0, 1.4);
            trackingSun.position.set(10, 40, 20);
            trackingSun.castShadow = true;
            trackingSun.shadow.mapSize.width = 1048;
            trackingSun.shadow.mapSize.height = 1048;
            scene.add(trackingSun);

            // Procedural Infinite Running Ground Path
            const trackGeo = new THREE.PlaneGeometry(35, 3000);
            const trackMat = new THREE.MeshStandardMaterial({ 
                color: 0x0f3d1e, 
                roughness: 0.85, 
                metalness: 0.1 
            });
            const runningTrack = new THREE.Mesh(trackGeo, trackMat);
            runningTrack.rotation.x = -Math.PI / 2;
            runningTrack.receiveShadow = true;
            scene.add(runningTrack);

            // Hierarchical Character Assembly Structure (Stylized Avatar Component)
            characterNode = new THREE.Group();
            
            // Core Torso
            const torsoGeo = new THREE.CylinderGeometry(0.35, 0.2, 1.3, 12);
            const torsoMat = new THREE.MeshStandardMaterial({ color: 0xbf360c, roughness: 0.5 });
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 0.95;
            torso.castShadow = true;
            characterNode.add(torso);

            // Cranial Head Unit
            const headGeo = new THREE.SphereGeometry(0.32, 24, 24);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.6 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.75;
            head.castShadow = true;
            characterNode.add(head);

            // Dynamic Hair Piece
            const hairGeo = new THREE.ConeGeometry(0.35, 0.6, 16);
            const hairMat = new THREE.MeshStandardMaterial({ color: 0x221100, roughness: 0.8 });
            const hair = new THREE.Mesh(hairGeo, hairMat);
            hair.position.set(0, 2.0, -0.05);
            hair.rotation.x = -0.3;
            characterNode.add(hair);

            scene.add(characterNode);

            // Generate Environmental Surroundings
            populateJungleEcosystem();

            // Calibrate Camera Matrix Offset behind character
            camera.position.set(0, 4.2, -6.5);
            camera.lookAt(new THREE.Vector3(0, 1.6, 20));
        }

        // Procedural generation of organic structural elements
        function populateJungleEcosystem() {
            const sequenceDepth = 75; 
            for(let i = 0; i < sequenceDepth; i++) {
                // Alternating positional spacing arrays along both track wings
                const sideFactor = (i % 2 === 0) ? 1 : -1;
                const lateralOffset = sideFactor * (Math.random() * 9 + 5.5);
                const longitudinalSpacing = i * 20;
                spawnJungleTreeElement(lateralOffset, longitudinalSpacing);
            }
        }

        function spawnJungleTreeElement(x, z) {
            const treeHierarchy = new THREE.Group();
            
            // Low-poly Organic Bark Trunk
            const trunkGeo = new THREE.CylinderGeometry(0.18, 0.45, 5, 8);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a2711, roughness: 0.9 });
            const trunkMesh = new THREE.Mesh(trunkGeo, trunkMat);
            trunkMesh.position.y = 2.5;
            trunkMesh.castShadow = true;
            treeHierarchy.add(trunkMesh);

            // Complex Tiered Jungle Canopies
            const canopyLevels = 3;
            for(let h = 0; h < canopyLevels; h++) {
                const layerScale = 2.4 - (h * 0.5);
                const canopyGeo = new THREE.ConeGeometry(layerScale, 2.2, 7);
                const canopyMat = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(0.33 + (Math.random()*0.05), 0.85, 0.2 + (h*0.06)),
                    roughness: 0.7 
                });
                const canopyMesh = new THREE.Mesh(canopyGeo, canopyMat);
                canopyMesh.position.y = 4.0 + (h * 1.3);
                canopyMesh.castShadow = true;
                treeHierarchy.add(canopyMesh);
            }

            treeHierarchy.position.set(x, 0, z);
            // Random initial rotation so models do not look uniformly mirrored
            treeHierarchy.rotation.y = Math.random() * Math.PI;
            
            scene.add(treeHierarchy);
            foliagePool.push(treeHierarchy);
        }

        // --- MATH ENGINE LOGIC ---
        function generateAnzanMathematicalSequence(stage) {
            let calculationsLength, internalFloor, internalCeiling;

            // Strict algorithm scaling parameters across all 50 sequential stages
            if (stage === 1) {
                calculationsLength = 6; internalFloor = 1; internalCeiling = 9;
            } else if (stage <= 10) {
                calculationsLength = 6 + Math.floor(stage / 2); internalFloor = 1; internalCeiling = 49;
            } else if (stage <= 25) {
                calculationsLength = 10 + (stage - 10); internalFloor = 10; internalCeiling = 499;
            } else if (stage <= 49) {
                calculationsLength = 18 + (stage * 2); internalFloor = 100; internalCeiling = 9999;
            } else { // Peak Ultimate Stage 50 Config Matrix
                calculationsLength = 60; internalFloor = 10000; internalCeiling = 99999;
            }

            let processingSequence = [];
            let localizedRunningSum = 0;

            for (let i = 0; i < calculationsLength; i++) {
                let generatedValue = Math.floor(Math.random() * (internalCeiling - internalFloor + 1)) + internalFloor;

                if (i === 0) {
                    // Condition Validation Rule: First index MUST stay inherently positive
                    localizedRunningSum = generatedValue;
                    processingSequence.push(generatedValue);
                } else {
                    // Operational Sign Determination Engine (+ or -)
                    let operationalSign = Math.random() > 0.45 ? 1 : -1;
                    
                    // Rule Check Protection: Aggregate value can never balance below zero
                    if (operationalSign === -1 && (localizedRunningSum - generatedValue) < 0) {
                        operationalSign = 1; // Coerced override substitution to positive operational space
                    }

                    localizedRunningSum += (generatedValue * operationalSign);
                    processingSequence.push(operationalSign * generatedValue);
                }
            }

            gameState.computedTarget = localizedRunningSum;
            gameState.sequenceArray = processingSequence;
        }

        // --- CORE ANIMATION & FLASH SYSTEM ---
        async function playFlashSequenceLoop() {
            gameState.isDisplaying = true;
            const targetScreenElement = document.getElementById('display-screen');
            document.getElementById('input-panel').classList.remove('active');
            
            // Scale velocity speeds relative to mathematical precision matrices
            let metricPulseWindow = Math.max(950 - (gameState.stage * 15), 180); 
            let emptyBlankWindow = Math.max(450 - (gameState.stage * 8), 70);

            // Shift runner speed into peak physical dash state
            gameState.velocityModifier = 3.2;

            await executionPause(1200); // Startup approach engine window buffer

            for (let operationalNumber of gameState.sequenceArray) {
                let formattingToken = operationalNumber > 0 ? `+${operationalNumber}` : `${operationalNumber}`;
                if(gameState.sequenceArray[0] === operationalNumber) formattingToken = `${operationalNumber}`; 
                
                targetScreenElement.innerText = formattingToken;
                targetScreenElement.style.transform = "translate(-50%, -50%) scale(1.25)";
                
                // Active camera kick displacement response artifact
                camera.position.z -= 0.25;

                await executionPause(metricPulseWindow);
                targetScreenElement.innerText = "";
                targetScreenElement.style.transform = "translate(-50%, -50%) scale(1.0)";
                await executionPause(emptyBlankWindow);
            }

            // Calculation sequence termination complete -> Invoke structural interface collection form
            gameState.isDisplaying = false;
            gameState.velocityModifier = 0.45; // Slow down character to stationary pace
            document.getElementById('input-panel').classList.add('active');
            document.getElementById('answer-input').focus();
        }

        function executionPause(ms) { 
            return new Promise(completeCallback => setTimeout(completeCallback, ms)); 
        }

        // --- INTERACTION SYSTEM RESPONSE CRADLE ---
        function processUserAnswerEvaluation() {
            const inputField = document.getElementById('answer-input');
            const numericParsedValue = parseInt(inputField.value, 10);

            if (numericParsedValue === gameState.computedTarget) {
                // Correct Answer
                let awardedPremiumDiamonds = gameState.stage * 10;
                gameState.diamonds += awardedPremiumDiamonds;
                document.getElementById('lbl-diamonds').innerText = gameState.diamonds;
                
                alert(`🎯 SEQUENCE CORRECT!\nEarned +${awardedPremiumDiamonds} Premium Diamonds.`);
                
                gameState.stage++;
                if(gameState.stage > 50) {
                    alert("👑 GRANDMASTER ACHIEVEMENT UNLOCKED!\nYou completed all 50 Stages of 3D ZED Flash Anzan.");
                    gameState.stage = 1;
                }
                document.getElementById('lbl-stage').innerText = gameState.stage;
                transitionToNextStageCycle();
            } else {
                // Incorrect Evaluation Matrix Entry
                alert(`❌ ERROR ENCOUNTERED\nCorrect mathematical evaluation was: ${gameState.computedTarget}\nRe-attempting current Stage ${gameState.stage}.`);
                transitionToNextStageCycle();
            }
            inputField.value = "";
        }

        function transitionToNextStageCycle() {
            generateAnzanMathematicalSequence(gameState.stage);
            playFlashSequenceLoop();
        }

        // --- TICK TIME ENGINE LOOP ---
        let deltaClock = new THREE.Clock();

        function executeFrameLoop() {
            requestAnimationFrame(executeFrameLoop);

            let engineDeltaTime = deltaClock.getDelta();
            let stepForwardVelocity = 18 * gameState.velocityModifier * engineDeltaTime;

            // Translate space coordinates continuously forward to sustain dynamic velocity
            characterNode.position.z += stepForwardVelocity;
            camera.position.z += stepForwardVelocity;

            // Runtime Character Kinetic Bobbing System Simulation
            if (gameState.velocityModifier > 0.6) {
                characterNode.position.y = Math.abs(Math.sin(characterNode.position.z * 1.6)) * 0.35;
                characterNode.rotation.z = Math.sin(characterNode.position.z * 1.6) * 0.08;
            } else {
                characterNode.position.y = 0;
                characterNode.rotation.z = 0;
            }

            // Procedural Infinite Loop Recycler Routine
            foliagePool.forEach(treeNode => {
                if (treeNode.position.z < camera.position.z - 25) {
                    // Recycle environmental coordinates deep into forward space frustum
                    treeNode.position.z += 1200; 
                    const directionalFactor = (Math.random() > 0.5) ? 1 : -1;
                    treeNode.position.x = directionalFactor * (Math.random() * 9 + 5.5);
                }
                
                // Add natural organic wind-sway variance to canopies
                treeNode.rotation.x = Math.sin(camera.position.z * 0.05 + treeNode.position.z) * 0.02;
            });

            renderer.render(scene, camera);
        }

        // --- HARDWARE INTERFACES & LISTENERS ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        document.getElementById('btn-start').addEventListener('click', () => {
            document.getElementById('modal-start').classList.add('hide');
            bootstrapGraphics();
            executeFrameLoop();
            transitionToNextStageCycle();
        });

        document.getElementById('btn-submit').addEventListener('click', processUserAnswerEvaluation);
        document.getElementById('answer-input').addEventListener('keydown', (inputKeyEvent) => {
            if (inputKeyEvent.key === 'Enter') processUserAnswerEvaluation();
        });

    </script>
</body>
</html>
