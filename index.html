<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ZED Flash Anzan Jungle</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin:0;
  overflow:hidden;
  font-family: "Segoe UI", Arial, sans-serif;
  background: radial-gradient(circle at top, #0a3d1c, #02150a 70%);
    margin: 0;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    color: white;
}

/* GLASS BASE */
.glass {
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    inset 0 0 12px rgba(255,255,255,0.08);
  border-radius: 16px;
/* ===== GLASS PANEL BASE ===== */
.panel {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    border-radius: 12px;
}

/* UI PANEL */
/* ===== UI MENU ===== */
#ui {
  position:absolute;
  top:15px;
  left:15px;
  width:270px;
  padding:16px;
  color:#eafff3;
  z-index:10;
  transition:0.3s;
    position: absolute;
    top: 15px;
    left: 15px;
    width: 280px;
    padding: 15px;
    z-index: 10;
}

#ui h2 {
  margin:0 0 10px;
  font-weight:600;
  font-size:16px;
  letter-spacing:1px;
  opacity:0.9;
    margin: 0 0 10px;
    font-size: 18px;
    text-align: center;
    letter-spacing: 1px;
}

/* LABELS */
#ui label {
  display:block;
  margin-top:10px;
  font-size:12px;
  opacity:0.8;
    display: block;
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.8;
}

/* INPUTS */
#ui input,
#ui select {
  width:100%;
  margin-top:5px;
  padding:8px;
  border-radius:10px;
  border:none;
  outline:none;
  background: rgba(255,255,255,0.12);
  color:white;
  backdrop-filter: blur(6px);
  transition:0.2s;
    width: 100%;
    margin-top: 4px;
    padding: 6px;
    border-radius: 6px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

#ui input:focus,
#ui select:focus {
  background: rgba(0,255,150,0.2);
  box-shadow: 0 0 10px rgba(0,255,150,0.4);
/* SLIDER */
#ui input[type=range] {
    accent-color: #00ffcc;
}

/* BUTTON */
#startBtn {
  margin-top:14px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
  font-weight:600;
  letter-spacing:1px;

  background: linear-gradient(135deg, #00ff9c, #00c46a);
  box-shadow: 0 0 15px rgba(0,255,150,0.5);
  transition:0.2s;
    margin-top: 14px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #00ffcc, #00c3ff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

#startBtn:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 0 25px rgba(0,255,150,0.8);
    transform: scale(1.05);
    box-shadow: 0 0 10px #00ffcc;
}

/* HUD */
/* ===== HUD ===== */
#hud {
  position:absolute;
  bottom:20px;
  left:20px;
  padding:12px 18px;
  color:#eafff3;
  font-size:20px;
  border-radius:14px;
    position: absolute;
    bottom: 20px;
    left: 20px;
    padding: 10px 14px;
    font-size: 20px;
}

/* ANSWER BOX */
/* ===== ANSWER BOX ===== */
#answerBox {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  width:300px;
  padding:20px;
  text-align:center;
  color:white;
  display:none;
  transition:0.3s ease;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    width: 300px;
    padding: 20px;
    text-align: center;
    display: none;
    animation: pop 0.3s ease forwards;
}

#answerBox.active {
  transform:translate(-50%,-50%) scale(1);
@keyframes pop {
    to { transform: translate(-50%, -50%) scale(1); }
}

/* TITLE */
#answerBox h3 {
  margin:0;
  font-weight:600;
  letter-spacing:1px;
    margin-bottom: 10px;
}

/* INPUT */
/* ANSWER INPUT */
#answerBox input {
  width:100%;
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  border:none;
  outline:none;
  background: rgba(255,255,255,0.15);
  color:white;
  text-align:center;
  font-size:16px;
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

/* SUBMIT BUTTON */
#answerBox button {
  margin-top:12px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;

  background: linear-gradient(135deg, #00e0ff, #0077ff);
  color:white;
  box-shadow: 0 0 15px rgba(0,140,255,0.5);
  transition:0.2s;
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #ffcc00, #ff8800);
    font-weight: bold;
    cursor: pointer;
}

#answerBox button:hover {
  transform: scale(1.05);
    box-shadow: 0 0 10px #ffcc00;
}

/* RESULT TEXT */
#result {
  margin-top:10px;
  font-size:14px;
  opacity:0.9;
    margin-top: 10px;
    font-weight: bold;
}

/* CANVAS FIX */
canvas {
    display: block;
}
</style>
</head>

<body>

<div id="ui" class="panel">
    <h2>⚡ ZED ANZAN</h2>

    <label>Speed</label>
    <input id="speed" type="range" min="1" max="20" value="5">

    <label>Digit Range</label>
    <select id="digits">
        <option value="9">1 - 9</option>
        <option value="99">1 - 99</option>
        <option value="999">1 - 999</option>
        <option value="9999">1 - 9999</option>
        <option value="99999">1 - 99999</option>
    </select>

    <label>Mode</label>
    <select id="mode">
        <option value="both">+ and -</option>
        <option value="plus">Only +</option>
        <option value="minus">Only -</option>
    </select>

    <label>Number of Lines</label>
    <input id="lines" type="number" value="5" min="1" max="50">

    <button id="startBtn">Start Game</button>
</div>

<div id="hud" class="panel">Score: 0</div>

<div id="answerBox" class="panel">
    <h3>Enter Answer</h3>
    <input id="answer" type="number">
    <button onclick="checkAnswer()">Submit</button>
    <p id="result"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let numbers = [];
let sequence = [];
let running = false;
let score = 0;
let totalSum = 0;
let speed = 0.1;

init();
animate();

/* INIT */
function init(){
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0a3d1c, 10, 100);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0,2,5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,10,5);
    scene.add(light);

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(20,200),
        new THREE.MeshStandardMaterial({color:0x1f7a3a})
    );
    ground.rotation.x = -Math.PI/2;
    ground.position.z = -80;
    scene.add(ground);

    for(let i=0;i<60;i++){
        let tree = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2,0.5,2),
            new THREE.MeshStandardMaterial({color:0x0b3d1a})
        );
        tree.position.set((Math.random()>0.5?6:-6),1,-i*4);
        scene.add(tree);
    }

    document.getElementById("startBtn").onclick = startGame;
}

/* GENERATE */
function generateSequence(){
    sequence = [];
    totalSum = 0;

    const max = parseInt(document.getElementById("digits").value);
    const mode = document.getElementById("mode").value;
    const lines = parseInt(document.getElementById("lines").value);

    for(let i=0;i<lines;i++){
        let val = Math.floor(Math.random()*max)+1;

        if(mode === "plus") val = Math.abs(val);
        else if(mode === "minus") val = -Math.abs(val);
        else val = Math.random()>0.5 ? val : -val;

        sequence.push(val);
        totalSum += val;
    }
}

/* SPAWN */
function spawnNumber(value, z){
    const canvas = document.createElement("canvas");
    canvas.width = 256;
    canvas.height = 256;

    const ctx = canvas.getContext("2d");
    ctx.fillStyle="black";
    ctx.fillRect(0,0,256,256);

    ctx.font="bold 60px Arial";
    ctx.fillStyle="white";
    ctx.textAlign="center";
    ctx.fillText(value,128,140);

    const tex = new THREE.CanvasTexture(canvas);

    const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(2,2),
        new THREE.MeshBasicMaterial({map:tex, transparent:true})
    );

    mesh.position.set((Math.random()-0.5)*6,2,z);
    scene.add(mesh);
    numbers.push(mesh);
}

/* START */
function startGame(){
    running = true;
    score = 0;

    numbers.forEach(n => scene.remove(n));
    numbers = [];

    document.getElementById("answerBox").style.display = "none";
    document.getElementById("result").innerText = "";

    generateSequence();

    for(let i=0;i<sequence.length;i++){
        spawnNumber(sequence[i], -i*6 - 10);
    }

    speed = parseFloat(document.getElementById("speed").value) * 0.05;
}

/* ANSWER */
function checkAnswer(){
    let ans = parseInt(document.getElementById("answer").value);
    let result = document.getElementById("result");

    if(ans === totalSum){
        result.innerText = "✅ Correct!";
    } else {
        result.innerText = "❌ Wrong! Answer: " + totalSum;
    }

    setTimeout(()=>{
        document.getElementById("answerBox").style.display = "none";
        document.getElementById("ui").style.display = "block";
    },2000);
}

/* LOOP */
function animate(){
    requestAnimationFrame(animate);

    if(running){
        camera.position.z -= speed;

        let passedAll = true;

        numbers.forEach(n=>{
            n.position.z += speed;
            if(n.position.z < camera.position.z + 10){
                passedAll = false;
            }
        });

        if(passedAll && numbers.length > 0){
            running = false;
            document.getElementById("ui").style.display = "none";
            document.getElementById("answerBox").style.display = "block";
        }
    }

    renderer.render(scene,camera);
}

window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
