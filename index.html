<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZED Flash Anzan Jungle PRO+</title>

<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }

#ui {
  position:absolute;
  top:10px; left:10px;
  width:270px;
  padding:12px;
  background:rgba(0,0,0,0.75);
  color:white;
  border-radius:10px;
  backdrop-filter: blur(10px);
}

label { font-size:12px; display:block; margin-top:8px; }

input, select {
  width:100%;
  padding:6px;
  border-radius:6px;
  border:none;
  margin-top:4px;
}

button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2ecc71;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#hud {
  position:absolute;
  bottom:15px;
  left:15px;
  color:white;
  font-size:20px;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
}

#popup {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.9);
  padding:20px;
  border-radius:12px;
  color:white;
  display:none;
  text-align:center;
  min-width:220px;
}

#popup input {
  margin-top:10px;
  padding:8px;
  width:100%;
}

.good { color:#2ecc71; font-size:20px; }
.bad { color:#e74c3c; font-size:20px; }
</style>
</head>

<body>

<div id="ui">
  <label>Speed</label>
  <input id="speed" type="range" min="1" max="20" value="6">

  <label>Digit Range</label>
  <select id="digits">
    <option value="9">1 - 9</option>
    <option value="99">1 - 99</option>
    <option value="999">1 - 999</option>
    <option value="9999">1 - 9999</option>
    <option value="99999">1 - 99999</option>
  </select>

  <label>Mode</label>
  <select id="mode">
    <option value="both">+ and -</option>
    <option value="plus">Only +</option>
    <option value="minus">Only -</option>
  </select>

  <label>Lines</label>
  <input id="lines" type="number" value="5" min="1" max="50">

  <button onclick="startGame()">START</button>
</div>

<div id="hud">Score: 0</div>

<div id="popup">
  <div id="msg">Enter result</div>
  <input id="answer" type="number">
  <button onclick="check()">Submit</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene, camera, renderer;
let player;
let numbers = [];
let sequence = [];
let result = 0;
let index = 0;
let running = false;
let speed = 0.1;
let gameEnded = false;

init();
animate();

function init(){

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x0b3d2e, 10, 120);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0,3,6);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,10,5);
  scene.add(light);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(30,200),
    new THREE.MeshStandardMaterial({color:0x145a32})
  );
  ground.rotation.x = -Math.PI/2;
  ground.position.z = -80;
  scene.add(ground);

  // 🌴 PLAYER (real humanoid model)
  const loader = new THREE.GLTFLoader();

  loader.load(
    "https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb",
    (gltf)=>{
      player = gltf.scene;
      player.scale.set(0.6,0.6,0.6);
      player.position.set(0,0,-2);
      scene.add(player);
    }
  );

  // jungle trees
  for(let i=0;i<60;i++){
    let tree = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3,0.7,2),
      new THREE.MeshStandardMaterial({color:0x0b3d1a})
    );
    tree.position.set((Math.random()>0.5?7:-7),1,-i*3);
    scene.add(tree);
  }
}

function generate(){
  sequence = [];
  result = 0;

  let max = +digits.value;
  let mode = modeSelect.value;
  let lines = +linesInput.value;

  for(let i=0;i<lines;i++){
    let v = Math.floor(Math.random()*max)+1;

    if(mode === "plus") v = Math.abs(v);
    if(mode === "minus") v = -Math.abs(v);
    if(mode === "both") v = Math.random()>0.5 ? v : -v;

    sequence.push(v);
    result += v;
  }
}

function spawn(val, z){
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle="black";
  ctx.fillRect(0,0,256,256);

  ctx.font="bold 70px Arial";
  ctx.fillStyle="white";
  ctx.textAlign="center";
  ctx.fillText(val,128,140);

  const tex = new THREE.CanvasTexture(canvas);

  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(2,2),
    new THREE.MeshBasicMaterial({map:tex,transparent:true})
  );

  mesh.position.set((Math.random()-0.5)*6,2,z);
  scene.add(mesh);

  numbers.push(mesh);
}

function startGame(){
  numbers.forEach(n=>scene.remove(n));
  numbers = [];

  index = 0;
  running = true;
  gameEnded = false;

  digits = document.getElementById("digits");
  modeSelect = document.getElementById("mode");
  linesInput = document.getElementById("lines");

  generate();

  for(let i=0;i<sequence.length;i++){
    spawn(sequence[i], -i*5 - 10); // closer spacing FIX
  }

  speed = +document.getElementById("speed").value * 0.05;
}

function endGame(){
  if(gameEnded) return;
  gameEnded = true;

  document.getElementById("popup").style.display="block";
}

function check(){
  let ans = +document.getElementById("answer").value;

  let popup = document.getElementById("popup");

  if(ans === result){
    popup.innerHTML = "<div class='good'>✔ Correct!</div>";
  } else {
    popup.innerHTML = "<div class='bad'>✖ Wrong</div><br>Answer: "+result;
  }

  setTimeout(()=>{
    popup.style.display="none";
    location.reload();
  },2500);
}

function animate(){
  requestAnimationFrame(animate);

  if(running){

    camera.position.z -= speed;

    numbers.forEach((n,i)=>{
      n.position.z += speed;

      // FIX: end when last item passes player
      if(i === numbers.length-1 && n.position.z > camera.position.z + 3){
        running = false;
        endGame();
      }
    });

    if(player){
      player.position.z -= speed;
    }
  }

  renderer.render(scene,camera);
}

window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
