<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D ZED Flash Anzan Jungle</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* ================= UI ================= */
#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 280px;
  padding: 18px;
  border-radius: 16px;

  background: rgba(10, 25, 20, 0.55);
  border: 1px solid rgba(0, 255, 153, 0.25);
  backdrop-filter: blur(14px);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(0,255,153,0.05);

  color: white;
  z-index: 10;
}

#ui .title {
  font-size: 16px;
  font-weight: bold;
  text-align: center;
  color: #00ff99;
  margin-bottom: 12px;
}

#ui label {
  display: block;
  margin-top: 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
}

#ui input,
#ui select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.35);
  color: white;
}

#startBtn {
  width: 100%;
  margin-top: 14px;
  padding: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg,#00ff99,#00cc77);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* ================= ANSWER ================= */
#answerBox {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  padding: 15px;
  border-radius: 10px;
  color: white;
  display: none;
  text-align: center;
  width: 280px;
  z-index: 10;
}

#answerBox input {
  width: 100%;
  padding: 8px;
  margin-top: 10px;
}

/* ================= RESPONSIVE ================= */

/* Tablet */
@media (max-width: 900px) {
  #ui {
    width: 240px;
  }
}

/* Phone */
@media (max-width: 600px) {
  #ui {
    width: 90vw;
    left: 50%;
    transform: translateX(-50%);
    top: 10px;
  }

  #answerBox {
    width: 90vw;
  }

  #ui .title {
    font-size: 14px;
  }
}

/* Small phones */
@media (max-width: 400px) {
  #ui {
    width: 95vw;
  }
}
</style>
</head>

<body>

<!-- UI -->
<div id="ui">
  <div class="title">3D ZED Flash Anzan</div>

  <label>Speed</label>
  <input id="speed" type="range" min="1" max="20" value="5">

  <label>Digit Range</label>
  <select id="digits">
    <option value="9">1 - 9</option>
    <option value="99">1 - 99</option>
    <option value="999">1 - 999</option>
    <option value="9999">1 - 9999</option>
    <option value="99999">1 - 99999</option>
  </select>

  <label>Mode</label>
  <select id="mode">
    <option value="both">+ and -</option>
    <option value="plus">Only +</option>
    <option value="minus">Only -</option>
  </select>

  <label>Lines</label>
  <input id="lines" type="number" value="5" min="1" max="50">

  <button id="startBtn">Start Game</button>
</div>

<!-- ANSWER -->
<div id="answerBox">
  <input type="number" id="answer" placeholder="Your answer">
  <button onclick="checkAnswer()">Submit</button>
  <div id="result"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* ================= SCENE ================= */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a1a0a, 10, 100);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

/* GROUND */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x0a3d0a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* TREES */
for(let i=0;i<60;i++){
  let tree = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2,0.5,2),
    new THREE.MeshStandardMaterial({color:0x0b3d1a})
  );
  tree.position.set((Math.random()-0.5)*60,1,(Math.random()-0.5)*80);
  scene.add(tree);
}

/* PLAYER */
const player = new THREE.Mesh(
  new THREE.BoxGeometry(0.5,1,0.5),
  new THREE.MeshStandardMaterial({color:0x00ff99})
);
player.position.y = 0.5;
scene.add(player);

/* GAME DATA */
let sequence = [];
let total = 0;
let running = false;

/* NUMBER GEN */
function gen(max, mode){
  let n = Math.floor(Math.random()*max)+1;

  if(mode === "plus") return n;
  if(mode === "minus") return -n;
  return Math.random()>0.5 ? n : -n;
}

/* SHOW NUMBER */
function showNumber(n){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshStandardMaterial({color:0x00ff99})
  );

  mesh.position.set(
    (Math.random()-0.5)*3,
    2,
    (Math.random()-0.5)*3
  );

  scene.add(mesh);
  setTimeout(()=>scene.remove(mesh),600);
}

/* START */
document.getElementById("startBtn").onclick = () => {
  if(running) return;
  running = true;

  sequence = [];
  total = 0;

  document.getElementById("ui").style.display = "none";

  const mode = document.getElementById("mode").value;
  const max = parseInt(document.getElementById("digits").value);
  const speed = parseInt(document.getElementById("speed").value);
  const lines = parseInt(document.getElementById("lines").value);

  let i = 0;

  const interval = setInterval(()=>{
    let num = gen(max, mode);

    sequence.push(num);
    total += num;

    showNumber(num);

    i++;
    if(i >= lines){
      clearInterval(interval);

      setTimeout(()=>{
        document.getElementById("answerBox").style.display = "block";
      }, speed);
    }
  }, speed);
};

/* CHECK */
function checkAnswer(){
  let val = parseInt(document.getElementById("answer").value);
  let res = document.getElementById("result");

  if(val === total){
    res.innerHTML = "✅ Correct!";
  } else {
    res.innerHTML = "❌ Wrong! Answer: " + total;
  }

  setTimeout(()=>{
    document.getElementById("answerBox").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("answer").value = "";
    res.innerHTML = "";
    running = false;
  },2000);
}

/* LOOP */
function animate(){
  requestAnimationFrame(animate);

  if(running){
    camera.position.z -= 0.05;
    player.position.x = Math.sin(Date.now()*0.001)*2;
  }

  renderer.render(scene,camera);
}
animate();

/* RESIZE FIX (RESPONSIVE) */
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
