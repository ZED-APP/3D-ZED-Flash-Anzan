<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZED Flash Anzan 3D Jungle</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #000;
}

/* ===== UI PANEL ===== */
#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 280px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid #00ff99;
  border-radius: 12px;
  color: white;
  backdrop-filter: blur(10px);
  z-index: 10;
}

h2 {
  color: #00ff99;
  margin: 5px 0 10px;
  text-align: center;
}

label {
  font-size: 12px;
  opacity: 0.8;
}

select, input {
  width: 100%;
  margin: 5px 0 10px;
  padding: 6px;
}

button {
  width: 100%;
  padding: 10px;
  background: #00ff99;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* ===== ANSWER BOX ===== */
#answerBox {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 15px;
  border-radius: 10px;
  display: none;
  z-index: 10;
}

#result {
  margin-top: 10px;
  text-align: center;
  color: white;
}
</style>
</head>

<body>

<!-- CONTROL PANEL -->
<div id="ui">
  <h2>🌿 ZED Flash Anzan</h2>

  <label>Type</label>
  <select id="type">
    <option value="both">+ and -</option>
    <option value="plus">Only +</option>
    <option value="minus">Only -</option>
  </select>

  <label>Digits</label>
  <select id="digits">
    <option value="9">1–9</option>
    <option value="99">1–99</option>
    <option value="999">1–999</option>
    <option value="9999">1–9999</option>
    <option value="99999">1–99999</option>
  </select>

  <label>Speed</label>
  <input type="range" id="speed" min="200" max="2000" value="900">

  <label>Lines (3–100)</label>
  <input type="number" id="lines" min="3" max="100" value="10">

  <button onclick="start()">START TRAINING</button>
</div>

<!-- ANSWER -->
<div id="answerBox">
  <input type="number" id="answer" placeholder="Your answer">
  <button onclick="check()">Submit</button>
  <div id="result"></div>
</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* =========================
   3D SETUP
========================= */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a1a0a, 10, 80);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

/* GROUND */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x0a3d0a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* TREES */
function tree(x,z){
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2,0.2,2),
    new THREE.MeshStandardMaterial({color:0x5c3a21})
  );

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1),
    new THREE.MeshStandardMaterial({color:0x0f5})
  );

  trunk.position.set(x,1,z);
  leaves.position.set(x,3,z);

  scene.add(trunk);
  scene.add(leaves);
}

for(let i=0;i<70;i++){
  tree((Math.random()-0.5)*60, (Math.random()-0.5)*60);
}

/* PLAYER */
const player = new THREE.Mesh(
  new THREE.BoxGeometry(0.5,1,0.5),
  new THREE.MeshStandardMaterial({color:0x00ff99})
);
player.position.y = 0.5;
scene.add(player);

/* GAME STATE */
let sequence = [];
let resultValue = 0;
let running = false;

/* NUMBER GENERATOR */
function gen(max, type){
  let n = Math.floor(Math.random()*max)+1;

  if(type === "plus") return n;
  if(type === "minus") return -n;

  return Math.random()>0.5 ? n : -n;
}

/* SHOW NUMBER (3D EFFECT) */
function showNumber(n){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshStandardMaterial({color:0x00ff99})
  );

  mesh.position.set(
    (Math.random()-0.5)*3,
    2,
    (Math.random()-0.5)*3
  );

  scene.add(mesh);
  setTimeout(()=>scene.remove(mesh), 600);
}

/* START GAME */
function start(){
  if(running) return;
  running = true;

  sequence = [];
  resultValue = 0;

  document.getElementById("ui").style.display = "none";

  const type = document.getElementById("type").value;
  const max = parseInt(document.getElementById("digits").value);
  const speed = parseInt(document.getElementById("speed").value);
  const lines = parseInt(document.getElementById("lines").value);

  let i = 0;

  const interval = setInterval(()=>{
    const num = gen(max, type);

    sequence.push(num);
    resultValue += num;

    showNumber(num);

    i++;
    if(i >= lines){
      clearInterval(interval);

      setTimeout(()=>{
        document.getElementById("answerBox").style.display = "block";
      }, speed);
    }

  }, speed);
}

/* CHECK ANSWER */
function check(){
  const val = parseInt(document.getElementById("answer").value);
  const res = document.getElementById("result");

  if(val === resultValue){
    res.innerHTML = "✅ Excellent!";
  } else {
    res.innerHTML = "❌ Wrong Answer";
  }

  setTimeout(()=>{
    document.getElementById("answerBox").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("answer").value = "";
    res.innerHTML = "";
    running = false;
  }, 2000);
}

/* ANIMATION LOOP */
function animate(){
  requestAnimationFrame(animate);

  player.position.x = Math.sin(Date.now()*0.001)*2;

  renderer.render(scene,camera);
}
animate();

/* RESIZE */
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
