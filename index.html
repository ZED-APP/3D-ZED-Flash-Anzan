<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZED Flash Anzan 3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* UI PANEL */
#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 260px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid #00ff99;
  border-radius: 12px;
  color: white;
  backdrop-filter: blur(10px);
  z-index: 10;
}

h2 {
  color: #00ff99;
  text-align: center;
  margin: 5px 0 10px;
}

label {
  font-size: 12px;
  opacity: 0.8;
}

select, input {
  width: 100%;
  margin: 5px 0 10px;
  padding: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #00ff99;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #00cc77;
}

/* ANSWER BOX */
#answerBox {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 15px;
  border-radius: 10px;
  color: white;
  display: none;
  z-index: 10;
}

#result {
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>

<!-- UI -->
<div id="ui">
  <h2>🌿 ZED Flash Anzan</h2>

  <label>Mode</label>
  <select id="mode">
    <option value="both">+ and -</option>
    <option value="plus">Only +</option>
    <option value="minus">Only -</option>
  </select>

  <label>Digits</label>
  <select id="digits">
    <option value="9">1–9</option>
    <option value="99">1–99</option>
    <option value="999">1–999</option>
    <option value="9999">1–9999</option>
    <option value="99999">1–99999</option>
  </select>

  <label>Speed (ms)</label>
  <input type="range" id="speed" min="200" max="2000" value="1000">

  <label>Lines (3–100)</label>
  <input type="number" id="lines" min="3" max="100" value="10">

  <button onclick="startGame()">START</button>
</div>

<!-- ANSWER -->
<div id="answerBox">
  <input type="number" id="answer" placeholder="Your answer">
  <button onclick="checkAnswer()">Submit</button>
  <div id="result"></div>
</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* =========================
   BASIC 3D SETUP
========================= */
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a1a0a, 10, 80);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

/* GROUND */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x0a3d0a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* TREES */
function tree(x,z){
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2,0.2,2),
    new THREE.MeshStandardMaterial({color:0x5c3a21})
  );
  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1),
    new THREE.MeshStandardMaterial({color:0x0f5})
  );

  trunk.position.set(x,1,z);
  leaves.position.set(x,3,z);

  scene.add(trunk);
  scene.add(leaves);
}

for(let i=0;i<60;i++){
  tree((Math.random()-0.5)*60, (Math.random()-0.5)*60);
}

/* PLAYER */
const player = new THREE.Mesh(
  new THREE.BoxGeometry(0.5,1,0.5),
  new THREE.MeshStandardMaterial({color:0x00ff99})
);
player.position.y = 0.5;
scene.add(player);

/* GAME DATA */
let numbers = [];
let total = 0;
let running = false;

/* RANDOM NUMBER */
function gen(max, mode){
  let n = Math.floor(Math.random()*max)+1;

  if(mode === "plus") return n;
  if(mode === "minus") return -n;
  return Math.random()>0.5 ? n : -n;
}

/* FLOAT TEXT (simple cube substitute) */
function showNumber(n){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.2),
    new THREE.MeshStandardMaterial({color:0x00ff99})
  );

  mesh.position.set(
    (Math.random()-0.5)*3,
    2,
    (Math.random()-0.5)*3
  );

  scene.add(mesh);

  setTimeout(()=>scene.remove(mesh), 700);
}

/* START GAME */
function startGame(){
  if(running) return;
  running = true;

  numbers = [];
  total = 0;

  document.getElementById("ui").style.display = "none";

  const mode = document.getElementById("mode").value;
  const max = parseInt(document.getElementById("digits").value);
  const speed = parseInt(document.getElementById("speed").value);
  const lines = parseInt(document.getElementById("lines").value);

  let i = 0;

  const interval = setInterval(()=>{
    let num = gen(max, mode);

    numbers.push(num);
    total += num;

    showNumber(num);

    i++;
    if(i >= lines){
      clearInterval(interval);

      setTimeout(()=>{
        document.getElementById("answerBox").style.display = "block";
      }, speed);
    }

  }, speed);
}

/* CHECK ANSWER */
function checkAnswer(){
  const val = parseInt(document.getElementById("answer").value);
  const result = document.getElementById("result");

  if(val === total){
    result.innerHTML = "✅ Correct!";
  } else {
    result.innerHTML = "❌ Wrong!";
  }

  setTimeout(()=>{
    document.getElementById("answerBox").style.display = "none";
    document.getElementById("ui").style.display = "block";
    document.getElementById("answer").value = "";
    result.innerHTML = "";
    running = false;
  }, 2000);
}

/* ANIMATION LOOP */
function animate(){
  requestAnimationFrame(animate);

  player.position.x = Math.sin(Date.now()*0.001)*2;

  renderer.render(scene,camera);
}
animate();

/* RESIZE */
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
